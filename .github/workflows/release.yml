name: release

# Release pipeline: triggered by tag pushes like `v0.1.2`. Produces three
# user-facing artifacts and attaches them to a GitHub release draft:
#   - AppImage    (portable single binary)
#   - Flatpak bundle (.flatpak)
#   - install.sh  (one-shot installer that fetches the AppImage + wires
#                  up the .desktop entry and icon)
#
# Builds can also be dry-run via workflow_dispatch for smoke tests —
# the release-publishing step is gated on `startsWith(github.ref, 'refs/tags/v')`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    name: AppImage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libx11-dev \
            libxcb1-dev \
            libssl-dev \
            fuse \
            libfuse2 \
            file

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Build AppImage
        run: pnpm tauri build --bundles appimage

      - name: Collect artifacts
        run: |
          mkdir -p release
          cp src-tauri/target/release/bundle/appimage/*.AppImage release/
          cp scripts/install.sh release/install.sh
          ls -la release/

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: glassforge-appimage
          path: |
            release/*.AppImage
            release/install.sh

  flatpak:
    name: Flatpak
    runs-on: ubuntu-24.04
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-46
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: glassforge.flatpak
          manifest-path: flatpak/com.glassforge.app.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: glassforge-flatpak
          path: glassforge.flatpak

  publish:
    name: Publish release
    needs: [appimage, flatpak]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: glassforge-appimage
          path: release/

      - name: Download Flatpak artifact
        uses: actions/download-artifact@v4
        with:
          name: glassforge-flatpak
          path: release/

      - name: List collected files
        run: ls -la release/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.AppImage
            release/*.flatpak
            release/install.sh
          generate_release_notes: true
          draft: false
