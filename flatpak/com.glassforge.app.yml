app-id: com.glassforge.app
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
command: glassforge

finish-args:
  - --socket=wayland
  - --socket=x11
  - --share=ipc
  - --share=network
  - --device=dri
  - --filesystem=home
  - --talk-name=org.kde.KWin
  - --talk-name=org.freedesktop.Notifications
  - --env=PATH=/app/bin:/usr/bin:/home/user/.local/bin:/usr/local/bin

build-options:
  append-path: /usr/lib/sdk/node20/bin:/run/build/glassforge/rustup/bin:/run/build/glassforge/npm/bin
  build-args:
    - --share=network
  env:
    CI: "true"
    RUSTUP_HOME: /run/build/glassforge/rustup
    CARGO_HOME: /run/build/glassforge/rustup
    NPM_CONFIG_PREFIX: /run/build/glassforge/npm
    PNPM_HOME: /run/build/glassforge/pnpm
    PNPM_STORE_DIR: /run/build/glassforge/pnpm-store

modules:
  - name: glassforge
    buildsystem: simple
    build-commands:
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.88.0 --profile minimal --no-modify-path
      - npm install -g pnpm
      - pnpm install --frozen-lockfile || pnpm install
      - pnpm tauri build --no-bundle
      - install -Dm755 src-tauri/target/release/glassforge /app/bin/glassforge
      - install -Dm644 src-tauri/icons/icon.png /app/share/icons/hicolor/256x256/apps/com.glassforge.app.png
      - install -Dm644 flatpak/com.glassforge.app.desktop /app/share/applications/com.glassforge.app.desktop
      - install -Dm644 flatpak/com.glassforge.app.metainfo.xml /app/share/metainfo/com.glassforge.app.metainfo.xml
    sources:
      - type: dir
        path: ..
